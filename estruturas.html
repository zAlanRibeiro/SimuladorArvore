<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Estruturas</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="estruturas.css">
</head>
<script src="js/sidebar.js"></script>
<body>
    <aside class="sidebar" id="sidebar-inject"></aside>
    <main class="main-content">
        <header class="main-header">
            <h2>Laboratório de Filas e Pilhas</h2>
            <!-- Botões de adicionar reintroduzidos -->
            <div class="header-actions">
                <button id="add-fila-btn" class="btn btn-primary">Adicionar Fila</button>
                <button id="add-pilha-btn" class="btn btn-primary">Adicionar Pilha</button>
            </div>
        </header>

        <div id="mensagem" class="mensagem"></div>

        <div id="workspace" class="workspace">
            <!-- As estruturas de dados criadas aparecerão aqui -->
        </div>
    </main>

    <!-- Scripts do Simulador -->
    <script src="js/fila.js"></script>
    <script src="js/pilha.js"></script>
    <script src="js/estruturas-main.js"></script>
</body>
</html>
